# .pre-commit-config.yaml
# This file defines pre-commit hooks for ensuring code quality
# across formatting, linting, and static analysis.

repos:
# Lint and format Python code using ruff (replaces black, isort, flake8).
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: "v0.15.6"
  hooks:
  - id: ruff          # linter
    args: [--fix]
  - id: ruff-format   # formatter

# Check for common issues in text files.
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: "v4.4.0"
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
  - id: check-added-large-files
